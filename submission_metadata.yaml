# ============================================================================
# AI tools declaration  (transparency only; not penalised)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Claude Code) for data exploration, architectural discussion, and
  code review while building the ranker. All scoring logic, the JD model, the
  ontology, and the honeypot/integrity heuristics are human-designed and
  hand-tuned against observed dataset behaviour. No candidate data was sent to
  any hosted LLM during ranking — the ranker is pure standard-library Python and
  makes zero network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Evidence-based ranker, not a keyword/embedding matcher. The JD is compiled
  offline into a JobSpec (weights, 5-9y band, explicit "do-NOT-want" penalties)
  plus an ontology of weighted concept clusters for the four must-haves
  (embeddings retrieval, vector/hybrid search, ranking & recommendation, ranking
  evaluation). Concept evidence is read primarily from career-history
  DESCRIPTIONS and titles; the skills array is weighted low and trust-adjusted
  (proficiency x duration x endorsements x verified assessment), which starves
  keyword-stuffers while still crediting genuine candidates whose tools live in
  their skills. Plain-language paraphrases in the ontology recover "Tier-5"
  hidden gems. A behavioural modifier (availability, recruiter-response rate,
  recency, notice, demand, verification) multiplies fit by ~0.6-1.1 to
  down-weight the dormant. An integrity gate detects honeypots via internal
  contradictions (experience-vs-career-span, expert-but-0-month skills,
  impossible dates) and forces them to ~0. Result: top-100 is 100% relevant ML
  titles, 100% India, 0 honeypots, in ~90s on one CPU core with no network.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true        # explicit integrity gate; 0 honeypots in top-100
  reproduction_tested: true
